name: Publish Docker image

on:
  push:
    branches: [ "main" ]

env:
  ANDROID_SDK_TOOLS_VERSION: ${{ vars.ANDROID_SDK_TOOLS_VERSION }}

jobs:
  push_tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v4
        with:
          context: .
          file: ./tools/Dockerfile
          platforms: linux/amd64
          build-args: |
            ANDROID_SDK_TOOLS_VERSION=${{ env.ANDROID_SDK_TOOLS_VERSION }}
          push: true
          tags: rentready/android-sdk:tools

  push_sdk:
    needs: push_tools
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: 37.1
            build-tools: 37.0.0
          - platform: 36.1
            build-tools: 36.1.0
          - platform: 35
            build-tools: 35.0.1
          - platform: 34
            build-tools: 34.0.0
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          build-args: |
            ANDROID_PLATFORM_VERSION=${{ matrix.platform }}
            ANDROID_BUILD_TOOLS_VERSION=${{ matrix.build-tools }}
          push: true
          tags: |
            rentready/android-sdk:${{ matrix.platform }}